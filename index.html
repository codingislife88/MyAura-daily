<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyAura Daily - Daily Mood & Habits</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>✨ MyAura Daily</h1>
            <p class="subtitle">Track your mood and daily habits</p>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Today's Entry Section -->
            <section class="entry-section">
                <h2>📅 Today's Entry</h2>
                <form id="entryForm">
                    
                    <!-- Mood Slider -->
                    <div class="form-group">
                        <label for="moodSlider">How are you feeling?</label>
                        <div class="mood-container">
                            <input type="range" id="moodSlider" min="1" max="10" value="5">
                            <span id="moodEmoji" class="mood-emoji">😐</span>
                        </div>
                        <div class="mood-labels">
                            <span>😢</span>
                            <span id="moodValue">5</span>
                            <span>😄</span>
                        </div>
                    </div>

                    <!-- Stress Level -->
                    <div class="form-group">
                        <label for="stress">Stress Level (1-10)</label>
                        <input type="range" id="stress" min="1" max="10" value="5">
                        <span id="stressValue">5</span>
                    </div>

                    <!-- Sleep Hours -->
                    <div class="form-group">
                        <label for="sleep">Hours of Sleep</label>
                        <input type="number" id="sleep" min="0" max="24" step="0.5" value="7">
                    </div>

                    <!-- Exercise -->
                    <div class="form-group">
                        <label for="exercise">Exercise (minutes)</label>
                        <input type="number" id="exercise" min="0" max="480" value="0">
                    </div>

                    <!-- Screen Time -->
                    <div class="form-group">
                        <label for="screenTime">Screen Time (hours)</label>
                        <input type="number" id="screenTime" min="0" max="24" step="0.5" value="0">
                    </div>

                    <!-- Outside Time -->
                    <div class="form-group">
                        <label for="outsideTime">Time Outside (minutes)</label>
                        <input type="number" id="outsideTime" min="0" max="480" value="0">
                    </div>

                    <!-- Daily Notes -->
                    <div class="form-group">
                        <label for="notes">Daily Notes</label>
                        <textarea id="notes" placeholder="How was your day? What's on your mind?" rows="4"></textarea>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-primary">💾 Save Today's Entry</button>
                </form>
            </section>

            <!-- Dashboard Section -->
            <section class="dashboard-section">
                <h2>📊 Past Entries</h2>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All Entries</button>
                    <button class="filter-btn" data-filter="7">Last 7 Days</button>
                    <button class="filter-btn" data-filter="30">Last 30 Days</button>
                </div>
                <div id="entriesList" class="entries-list">
                    <p class="no-entries">No entries yet. Start tracking today!</p>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <h2>📈 Quick Stats</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <p class="stat-label">Average Mood</p>
                        <p id="avgMood" class="stat-value">--</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Average Sleep</p>
                        <p id="avgSleep" class="stat-value">-- hrs</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Total Exercise</p>
                        <p id="totalExercise" class="stat-value">-- min</p>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Total Entries</p>
                        <p id="totalEntries" class="stat-value">0</p>
                    </div>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer>
            <p>✨ Your daily wellness journey starts now.</p>
            <button id="clearDataBtn" class="btn-danger">🗑️ Clear All Data</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
